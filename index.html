<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F4F6FB">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundiais">
<title>Mundiais das Seleções</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#F4F6FB; --panel:#FFFFFF; --panel2:#EEF1F8; --raise:#E2E7F2;
    --line:#DDE3EF; --line2:#C5CEE0;
    --txt:#1A2238; --mut:#5f6884; --dim:#9aa3ba;
    --lime:#5B8C00; --lime-d:#3f6300; --cyan:#0E9C8A; --gold:#C8901A; --red:#E03150;
    --on-accent:#FFFFFF;
    --rgrad:linear-gradient(90deg,#7AB317,#0E9C8A);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;touch-action:pan-x pan-y}
  body{touch-action:pan-x pan-y;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(14,156,138,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(122,179,23,.06), transparent 55%),
      var(--ink);
    color:var(--txt);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding-bottom:64px;
    padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 14px}

  header{position:sticky;top:0;z-index:40;margin:0 -14px;
         padding:calc(10px + env(safe-area-inset-top)) 14px 0;
         background:rgba(244,246,251,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .topbar{height:5px;border-radius:5px;background:var(--rgrad);margin-bottom:0;box-shadow:0 0 24px rgba(91,140,0,.25)}
  .midbar{height:5px;border-radius:5px;background:var(--rgrad);margin:0;box-shadow:0 0 18px rgba(91,140,0,.22)}
  h1{font-family:Anton,Impact,sans-serif;font-weight:400;letter-spacing:.5px;line-height:.92;
     font-size:clamp(38px,11vw,62px);margin:0;text-transform:uppercase}
  h1 .y{color:var(--lime);display:block}
  .sub{color:var(--mut);font-size:13.5px;margin-top:9px;max-width:46ch}
  .sub b{color:var(--txt);font-weight:600}

  /* ---- TABS ---- */
  .tabs{display:flex;gap:5px;margin:0 -14px;padding:9px 14px 10px}
  .tab{flex:1;appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--mut);
       font-family:Inter,sans-serif;font-weight:700;font-size:12px;line-height:1.08;padding:8px 4px;border-radius:11px;
       cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center;text-align:center}
  .tab.active{background:var(--lime);color:var(--on-accent);border-color:var(--lime)}
  .tab:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}

  .panel{display:none;animation:fade .18s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:.4}to{opacity:1}}
  .panel-h{margin:20px 0 3px;font-family:Anton,sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.5px;
           font-size:clamp(21px,5.6vw,27px)}
  .panel-d{color:var(--mut);font-size:13px;margin:0 0 16px}
  .panel-d b{color:var(--txt)}

  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
        border-radius:14px;padding:14px;margin-bottom:12px}
  .grp-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .grp-badge{font-family:Anton,sans-serif;font-size:22px;width:38px;height:38px;display:grid;place-items:center;
             background:var(--raise);border:1px solid var(--line2);border-radius:10px;color:var(--cyan)}
  .grp-h .nm{font-weight:700;font-size:15px}
  .grp-h .sm{color:var(--mut);font-size:12px}

  /* ---- INPUTS: compactos, bandeira antes do nome ---- */
  .match2{display:grid;grid-template-columns:1fr auto 1fr;column-gap:8px;row-gap:6px;padding:9px 0;border-top:1px dashed var(--line)}
  .match2:first-of-type{border-top:0;padding-top:2px}
  .tcol{grid-row:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px}
  .tcol.h{grid-column:1}
  .tcol.a{grid-column:3}
  .tlabel{display:flex;align-items:center;gap:6px;min-width:0;max-width:100%}
  .tlabel .flag2{font-size:18px;line-height:1;flex:none}
  .tlabel .tn2{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .oddscell{grid-row:2;min-width:0}
  .oddscell.h{grid-column:1}
  .oddscell.a{grid-column:3}
  .mmid{grid-row:1;grid-column:2;align-self:start;display:flex;flex-direction:column;align-items:center;gap:7px}
  .mmid .mx{color:var(--dim);font-family:Inter,sans-serif;font-size:12px;font-weight:700}
  .livetog{display:inline-block;border:1px solid var(--line2);background:var(--panel2);color:var(--mut);
           font-family:Inter,sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;
           padding:3px 8px;border-radius:20px;white-space:nowrap}
  .livetog.on{background:var(--cyan);color:var(--on-accent);border-color:var(--cyan)}
  .livetog.done{background:var(--lime);color:var(--on-accent);border-color:var(--lime)}
  .livebtn{cursor:pointer;-webkit-appearance:none;appearance:none}
  .livebtn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .stepper{display:flex;align-items:center;background:var(--ink);border:1px solid var(--line2);border-radius:10px;overflow:hidden}
  .stepper button{appearance:none;border:0;background:transparent;color:var(--txt);font-size:17px;font-weight:700;
                  width:32px;height:32px;cursor:pointer;line-height:1;display:grid;place-items:center}
  .stepper button:active{background:var(--raise)}
  .stepper button:disabled{cursor:default;color:var(--dim)}
  .stepper.dis{opacity:.5}
  .stepper .val{min-width:24px;text-align:center;font-family:Inter,sans-serif;font-weight:700;font-size:16px}
  .qopp{font-family:Inter,sans-serif;font-size:10px;line-height:1.3;margin-top:6px;width:100%;max-width:100%;text-align:center}
  .qopp .oddline{display:flex;align-items:center;justify-content:center;gap:5px;padding:1px 0;color:var(--txt)}
  .qopp .oddline .f{flex:none}
  .qopp .oddline .nm{color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:92px}
  .qopp .oddline .pct{color:var(--cyan);font-weight:700;flex:none}
  .qopp .oddline.out .nm{color:var(--dim)}
  .qopp .oddline.out .pct{color:var(--red)}
  .qopp .badge{display:inline-flex;align-items:center;gap:5px;justify-content:center;font-weight:700;
               border:1px solid var(--lime);border-radius:20px;padding:3px 9px;color:var(--lime);background:rgba(91,140,0,.10);max-width:100%}
  .qopp .badge.outb{border-color:var(--red);color:var(--red);background:rgba(255,86,106,.10)}
  .qopp .badge .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .grp-time{margin-left:auto;font-family:Inter,sans-serif;font-size:12px;font-weight:700;color:var(--cyan);
            border:1px solid var(--line2);border-radius:8px;padding:2px 8px;flex:none}
  .oddsmode{display:flex;gap:6px;margin:0 0 14px}
  .omode{flex:1;appearance:none;border:1px solid var(--line2);background:var(--panel2);color:var(--mut);
         font-family:Inter,sans-serif;font-weight:600;font-size:12px;padding:8px 6px;border-radius:10px;cursor:pointer;min-height:38px}
  .omode.active{background:var(--lime);color:var(--on-accent);border-color:var(--lime)}
  .omode:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
  .liverow{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
  .livestatus{font-family:Inter,sans-serif;font-size:11px;color:var(--mut);padding:3px 9px;border-radius:20px;border:1px solid var(--line2);background:var(--panel2)}
  .livestatus.ok{color:var(--on-accent);background:var(--lime);border-color:var(--lime)}
  .livestatus.warn{color:var(--gold);border-color:rgba(255,200,61,.4)}
  .livestatus.load{color:var(--cyan);border-color:rgba(14,156,138,.4)}

  .btnrow{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .btn{appearance:none;border:1px solid var(--line2);background:var(--raise);color:var(--txt);
       font-family:Inter,sans-serif;font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.lime{background:var(--lime);color:var(--on-accent);border-color:var(--lime)}
  .btn.ghost{background:transparent}
  .btn:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}

  /* ---- TABELAS ---- */
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th{font-family:Inter,sans-serif;font-weight:600;color:var(--mut);font-size:10px;
               letter-spacing:.5px;text-align:right;padding:4px 4px;border-bottom:1px solid var(--line)}
  table.tbl th.l{text-align:left}
  table.tbl td{padding:7px 4px;text-align:right;border-bottom:1px solid var(--line);font-family:Inter,sans-serif}
  table.tbl td.l{text-align:left;font-family:Inter,sans-serif}
  table.tbl tr:last-child td{border-bottom:0}
  .pos{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:5px;font-size:11px;font-weight:700;
       background:var(--raise);color:var(--mut);margin-right:7px}
  .pos.q1,.pos.q2{background:var(--cyan);color:var(--on-accent)}
  .pos.q3{background:var(--lime);color:var(--on-accent)}
  .tname{font-weight:600}.tflag{margin-right:7px}
  .pts{color:var(--lime);font-weight:700}
  .row-por{background:rgba(255,200,61,.07)}
  .row-por .tname{color:var(--gold)}

  .aigrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .aibox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
  .aibox .gl{font-family:Anton,sans-serif;color:var(--cyan);font-size:15px;margin-bottom:4px}
  .aibox .ln{display:flex;gap:6px;align-items:center;font-size:12.5px;padding:1px 0}
  .aibox .ln .p{font-family:Inter,sans-serif;color:var(--dim);width:16px}
  .aibox .ln.t3 .p{color:var(--lime)}

  /* ---- TERCEIROS ---- */
  .third{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:var(--panel2)}
  .third.in{background:linear-gradient(90deg,rgba(91,140,0,.10),rgba(14,156,138,.04));border-color:rgba(91,140,0,.35)}
  .third.out{opacity:.62}
  .third .rk{font-family:Inter,sans-serif;font-weight:700;width:22px;text-align:center;color:var(--mut)}
  .third.in .rk{color:var(--lime)}
  .third .fl{font-size:20px;width:24px;text-align:center}
  .third .info{flex:1;min-width:0}
  .third .info .n{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .third .info .n .gl{color:var(--dim);font-family:Inter,sans-serif;font-size:11px;margin-left:5px}
  .third .info .opp{color:var(--cyan);font-size:11px;font-family:Inter,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .third.out .info .opp{color:var(--dim)}
  .third .st{font-family:Inter,sans-serif;font-size:11px;color:var(--mut);text-align:right;white-space:nowrap}
  .third.por{border-color:var(--gold)!important}.third.por .info .n{color:var(--gold)}
  .cutline{display:flex;align-items:center;gap:10px;margin:12px 2px 14px;color:var(--lime);
           font-family:Inter,sans-serif;font-size:11px;letter-spacing:1px;font-weight:700}
  .cutline::before,.cutline::after{content:"";flex:1;height:0;border-top:2px dashed var(--lime-d);opacity:.7}

  .subh{font-family:Anton,sans-serif;text-transform:uppercase;letter-spacing:.5px;font-size:17px;margin:24px 0 4px}
  .dist{display:grid;grid-template-columns:1fr;gap:7px}
  .dpair{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px}
  .dpair .mj{font-family:Inter,sans-serif;color:var(--dim);font-size:10px;width:38px;flex:none}
  .dpair .w{display:flex;align-items:center;gap:7px;flex:1;min-width:0;font-weight:600}
  .dpair .arrow{color:var(--dim);font-family:Inter,sans-serif;flex:none}
  .dpair .t3{display:flex;align-items:center;gap:7px;flex:1;min-width:0;justify-content:flex-end;text-align:right;font-weight:600}
  .dpair .lab{font-family:Inter,sans-serif;font-size:11px;flex:none;color:var(--lime)}
  .dpair .ef{font-size:17px;flex:none}

  /* ---- PLAYOFFS / BRACKET ---- */
  .bracket-hint{color:var(--dim);font-size:11.5px;margin:2px 0 10px;display:flex;align-items:center;gap:6px}
  .bracket-hint .k{color:var(--cyan)}
  .bracket-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding:2px 2px 14px;
                  scrollbar-width:thin}
  .bracket{display:flex;gap:34px;min-width:976px}
  .col{display:flex;flex-direction:column;flex:0 0 168px}
  .chead{height:30px;flex:0 0 30px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;
         font-family:Inter,sans-serif;font-size:11px;letter-spacing:1px;color:var(--cyan);
         text-transform:uppercase;border-bottom:1px solid var(--line)}
  /* a coluna cresce com o nº de jogos (16 nos 16-avos): cada jogo nunca encolhe abaixo de 90px,
     evitando que os últimos 16-avos transbordem e fiquem escondidos sob o banner do campeão.
     Todas as colunas ficam com a mesma altura (stretch) -> conectores continuam alinhados. */
  .games{flex:1 1 auto;display:flex;flex-direction:column}
  .gw{flex:1 0 90px;display:flex;align-items:center;position:relative}
  .gw .ko{width:100%}
  /* conectores: cada par liga-se ao jogo seguinte */
  .col:not(:last-child) .gw:nth-child(odd)::after{
    content:"";position:absolute;right:-17px;top:50%;width:17px;height:100%;
    border-top:2px solid var(--line2);border-right:2px solid var(--line2)}
  .col:not(:last-child) .gw:nth-child(even)::after{
    content:"";position:absolute;right:-17px;top:50%;width:17px;height:2px;background:var(--line2)}
  .col:not(:first-child) .gw::before{
    content:"";position:absolute;left:-17px;top:50%;width:17px;height:2px;background:var(--line2)}

  .ko{background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .ko .jno{font-family:Inter,sans-serif;font-size:9px;letter-spacing:.5px;color:var(--dim);
           padding:4px 8px 1px;display:flex;justify-content:space-between}
  .koteam{display:flex;align-items:center;gap:6px;padding:7px 7px;border:0;background:transparent;color:var(--txt);
          font-family:Inter,sans-serif;font-size:12px;text-align:left;width:100%;cursor:pointer;border-top:1px solid var(--line)}
  .koteam:first-child{border-top:0}
  .koteam .fl{font-size:14px;width:16px;text-align:center;flex:none}
  .koteam .nm{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .koteam .src{color:var(--dim);font-family:Inter,sans-serif;font-size:9px;flex:none}
  .koteam.pick{background:linear-gradient(90deg,rgba(91,140,0,.18),transparent)}
  .koteam.pick .nm{color:var(--lime)}
  .koteam.dim{opacity:.4}
  .koteam.tbd{cursor:default;color:var(--dim)}
  .koteam:disabled{cursor:default}
  .koteam:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px}
  .ko.haspor{border-color:var(--gold)}
  .koteam.por .nm{color:var(--gold)}
  .ko.champ{background:linear-gradient(180deg,rgba(255,200,61,.14),var(--panel2));border-color:var(--gold)}

  .champ-banner{display:flex;align-items:center;gap:11px;justify-content:center;margin:18px 0 6px;padding:14px;
    border:1px solid var(--gold);border-radius:14px;background:linear-gradient(180deg,rgba(255,200,61,.14),var(--panel2))}
  .champ-banner.empty{color:var(--mut);border-style:dashed;border-color:var(--line2);background:var(--panel2);font-size:13px;font-weight:500}
  .champ-banner .cup,.champ-banner .fl{font-size:26px;flex:none}
  .cwrap{display:flex;flex-direction:column;line-height:1.05}
  .champ-banner .cn{font-family:Anton,sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:.5px}
  .champ-banner .cn.por{color:var(--gold)}
  .champ-banner .ct{font-family:Inter,sans-serif;font-size:10px;color:var(--mut);letter-spacing:1.5px}

  .thirdplace{margin-top:16px;max-width:320px}
  .tp-h{font-family:Inter,sans-serif;font-size:11px;color:var(--mut);letter-spacing:1px;margin:0 0 8px;text-transform:uppercase}

  .hint{color:var(--mut);font-size:12px;margin:8px 2px 0;display:flex;align-items:center;gap:6px}
  .hint .k{color:var(--lime);font-weight:700}
  footer{margin:40px 0 0;color:var(--dim);font-size:11.5px;text-align:center;line-height:1.7}
  details summary::-webkit-details-marker{display:none}
  /* ---- PULL-TO-REFRESH (pílula flutuante com anel de progresso) ---- */
  .ptr{position:fixed;top:0;left:0;right:0;display:flex;justify-content:center;
       z-index:50;pointer-events:none;transform:translateY(-72px);will-change:transform}
  .ptr-pill{margin-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;
            background:rgba(255,255,255,.94);border:1px solid var(--line2);border-radius:30px;
            padding:9px 16px 9px 11px;box-shadow:0 10px 30px rgba(40,55,90,.18);
            -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
            transform:scale(.84);opacity:.55;transition:transform .16s ease,opacity .16s ease}
  .ptr.armed .ptr-pill,.ptr.spin .ptr-pill{transform:scale(1);opacity:1}
  .ptr-ring{--p:0;width:22px;height:22px;border-radius:50%;flex:none;
            background:conic-gradient(var(--cyan) calc(var(--p)*3.6deg),rgba(255,255,255,.12) 0);
            -webkit-mask:radial-gradient(circle 6.5px at 50% 50%,transparent 98%,#000 100%);
                    mask:radial-gradient(circle 6.5px at 50% 50%,transparent 98%,#000 100%)}
  .ptr.armed .ptr-ring{background:conic-gradient(var(--lime) calc(var(--p)*3.6deg),rgba(255,255,255,.12) 0)}
  .ptr.spin .ptr-ring{background:conic-gradient(from 0deg,transparent,var(--cyan));animation:spin .7s linear infinite}
  .ptr-txt{font-family:Inter,sans-serif;font-size:12px;font-weight:600;color:var(--mut);white-space:nowrap}
  .ptr.armed .ptr-txt{color:var(--lime)}
  .ptr.spin .ptr-txt{color:var(--cyan)}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- ECRÃ DE ARRANQUE (splash / loading) ---- */
  #splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(14,156,138,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(122,179,23,.07), transparent 55%),
      var(--ink);
    transition:opacity .42s ease;padding:24px}
  #splash.hide{opacity:0;pointer-events:none}
  .splash-bar{width:118px;height:6px;border-radius:6px;background:var(--rgrad);box-shadow:0 0 24px rgba(91,140,0,.3)}
  .splash-logo{font-family:Anton,Impact,sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:1px;
    line-height:.9;text-align:center;font-size:clamp(34px,12vw,56px)}
  .splash-logo span{display:block;color:var(--lime)}
  .splash-spin{width:30px;height:30px;border:3px solid var(--line2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
  .splash-sub{font-family:Inter,sans-serif;font-size:12px;letter-spacing:.5px;color:var(--mut)}

  /* ---- ESCURECER AO TROCAR DE EDIÇÃO (sem logo, só dim + spinner) ---- */
  #switchDim{position:fixed;inset:0;z-index:99;display:flex;align-items:center;justify-content:center;
    background:rgba(4,7,14,.55);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);

  /* previsão dos ocupantes nos jogos por definir + realce da seleção destacada */

<!-- Módulo live do 2026: Anexo C (emparelhamento dos 16-avos), quadro interativo,
     simulação Monte Carlo do percurso e live ESPN. (Caveat: o Anexo C herdado assume
     8 grupos; rever para os 12 grupos do formato de 48 num próximo torneio.) -->
<script src="live2026.js"></script>
<script>
"use strict";
/* =====================================================================
   HUB MULTI-MUNDIAL — base do simulador Mundial 2026 (spin-off)
   · Edições FECHADAS (status:"closed"): dados reais, só leitura.
   · Edições EM CURSO (status:"live"): grupos disponíveis; o quadro
     interativo + simulação ficam no MÓDULO LIVE comentado no fim.
   Modelo de dados uniforme em data/<id>.json (grupos com jogos OU com
   classificação; quadro a eliminar com confrontos e resultados).
   ===================================================================== */

/* ===================== REGISTO DE EDIÇÕES ===================== */
// Régua única por ano: Mundiais (comp:"wc") e Europeus (comp:"euro") lado a lado.

/* ===================== FUNDO DO CABEÇALHO COM A BANDEIRA ===================== */
// desenha o emoji da bandeira num canvas e usa-o (desfocado/desvanecido por CSS)
// como fundo da régua de competições — cobre qualquer seleção, sem mapa de cores.
const _flagImgCache = {};
function flagImg(key){
  if(key in _flagImgCache) return _flagImgCache[key];
  let url="";
  const t=team(key), emoji=t&&t.flag;
  if(emoji){
    try{
      const w=96, h=72;
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      const x=c.getContext("2d");
      x.font="64px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif";
      x.textAlign="center"; x.textBaseline="middle";
      x.fillText(emoji, w/2, h/2);
      // recorta aos limites reais da bandeira (tira as margens transparentes)
      const d=x.getImageData(0,0,w,h).data;
      let n=0, minX=w, minY=h, maxX=-1, maxY=-1;
      for(let yy=0;yy<h;yy++) for(let xx=0;xx<w;xx++){
        if(d[(yy*w+xx)*4+3]>40){ n++; if(xx<minX)minX=xx; if(xx>maxX)maxX=xx; if(yy<minY)minY=yy; if(yy>maxY)maxY=yy; }
      }
      if(n>60 && maxX>=minX){
        const cw=maxX-minX+1, ch=maxY-minY+1;
        const c2=document.createElement("canvas"); c2.width=cw; c2.height=ch;
        c2.getContext("2d").drawImage(c, minX,minY,cw,ch, 0,0,cw,ch);
        url=c2.toDataURL("image/png");
      }
    }catch(_){}
  }
  _flagImgCache[key]=url;
  return url;
}
function setHeaderFlag(key){
  const ew=document.querySelector(".edwrap"); if(!ew) return;
  const url=flagImg(key);
  ew.style.setProperty("--flagimg", url?`url("${url}")`:"none");
  ew.classList.toggle("hasflag", !!url);
}

/* ===================== HELPERS DE EQUIPA ===================== */
const team = n => (ED && ED.teams && ED.teams[n]) || REGISTRY.teams[n] || null;
const pt   = n => { const t=team(n); return t? t.pt   : (n||"—"); };
const fl   = n => { const t=team(n); return t? t.flag : "🏳️"; };
const rank = n => { const t=(ED&&ED.teams&&ED.teams[n])||REGISTRY.teams[n]; return t&&Number.isFinite(t.rank)? t.rank : 999; };
const _n   = v => (v==null ? "·" : v);
// competição da edição atual: rótulo do campeão muda entre Mundial e Europeu
const isEuro      = () => !!(ED && ED.competition==="euro");
const champTitle  = () => isEuro() ? "campeão da Europa" : "campeão do mundo";
const champTitleUC= () => isEuro() ? "CAMPEÃO DA EUROPA" : "CAMPEÃO DO MUNDO";

// carrega as fichas de todas as edições uma vez -> lista global alfabética de seleções
async function buildRegistry(){
  if(Object.keys(REGISTRY.teams).length) return;
  await Promise.all(EDITIONS.map(async e=>{
    try{ const r=await fetch(`data/${e.id}.json`,{cache:"force-cache"}); if(!r.ok) return; const d=await r.json();
      for(const n in d.teams){ if(!REGISTRY.teams[n]) REGISTRY.teams[n]=d.teams[n]; (REGISTRY.editions[n]=REGISTRY.editions[n]||[]).push(e.id); }
    }catch(_){}
  }));
}

/* ===================== MOTOR: classificação a partir dos jogos ===================== */
function statsOf(names, matches){
  const s={}; names.forEach(n=>s[n]={pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0});
  for(const m of matches){ const h=m[0],a=m[1],hg=m[2],ag=m[3];
    if(hg==null||ag==null||!s[h]||!s[a]) continue;
    s[h].gf+=hg; s[h].ga+=ag; s[a].gf+=ag; s[a].ga+=hg;
    if(hg>ag){s[h].pts+=3;s[h].w++;s[a].l++;}
    else if(hg<ag){s[a].pts+=3;s[a].w++;s[h].l++;}
    else {s[h].pts++;s[a].pts++;s[h].d++;s[a].d++;} }
  names.forEach(n=>s[n].gd=s[n].gf-s[n].ga);
  return s;
}
// desempate global (fallback): pontos · DG · GM · ranking
const cmpStd = (a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || rank(a.team)-rank(b.team);

// desempate UEFA: para equipas niveladas em pontos aplica-se primeiro o
// CONFRONTO DIRETO (mini-tabela: pontos · DG · GM entre elas) e só depois
// DG/GM gerais e ranking. Necessário para os Europeus (ex.: Euro 2024 grupo E,
// todos com 4 pts; Euro 2012 grupo A, Grécia passa à frente da Rússia).
function orderGroup(teams, matches){
  const s=statsOf(teams, matches);
  const rows=teams.map(t=>Object.assign({team:t}, s[t]));
  rows.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const lvl=rows.filter(r=>r.pts===a.pts).map(r=>r.team);
    if(lvl.length>1 && lvl.length<teams.length){
      const sub=statsOf(lvl, matches.filter(m=>lvl.includes(m[0])&&lvl.includes(m[1])));
      const sa=sub[a.team], sb=sub[b.team];
      if(sb.pts!==sa.pts) return sb.pts-sa.pts;
      if(sb.gd!==sa.gd)   return sb.gd-sa.gd;
      if(sb.gf!==sa.gf)   return sb.gf-sa.gf;
    }
    return b.gd-a.gd || b.gf-a.gf || rank(a.team)-rank(b.team);
  });
  return rows;
}

function groupNames(g){ return g.matches ? g.teams : g.standings.map(r=>r.team); }
function groupStandings(g){
  if(g.matches){
    return orderGroup(g.teams, g.matches);
  }
  // classificação já ordenada (grupo encerrado sem jogo-a-jogo)
  return g.standings.map(r=>({team:r.team,pts:r.pts,gd:r.gd,gf:r.gf,ga:r.ga,w:null,d:null,l:null}));
}
function groupOf(t){ for(const g of ED.groups){ if(groupNames(g).includes(t)) return g; } return null; }
function teamStanding(t){
  const g=groupOf(t); if(!g) return null;
  const tbl=groupStandings(g), pos=tbl.findIndex(r=>r.team===t);
  return {group:g, name:g.name, pos:pos+1, row:tbl[pos], table:tbl};
}
// >>> FIX DO PERCURSO: só os jogos da seleção escolhida <<<
function teamGroupMatches(t){
  const g=groupOf(t); if(!g||!g.matches) return null;
  return g.matches.filter(m=>m[0]===t||m[1]===t).map(m=>({h:m[0],a:m[1],hg:m[2],ag:m[3]}));
}

/* ===================== QUADRO A ELIMINAR (edições fechadas) ===================== */
function tieWinner(t){
  if(t.hg>t.ag) return t.home; if(t.ag>t.hg) return t.away;
  if(t.pens)    return t.pens[0]>=t.pens[1] ? t.home : t.away;
  return null;
}
function allTies(){
  if(!ED.knockout) return [];
  const ko=ED.knockout, out=[];
  for(const r of ko.rounds) for(const id of r.ties){ const t=ko.ties[id]; if(t) out.push(Object.assign({id,round:r.short,roundFull:r.name}, t)); }
  if(ko.third) out.push(Object.assign({id:"TP",round:"3.º/4.º",roundFull:"Disputa do 3.º/4.º lugar"}, ko.third));
  return out;
}

/* ===================== RENDER: GRUPOS ===================== */
// Marca os melhores terceiros nas edições de 48 (12 grupos): passam 2.º + 8 melhores 3.º.
// (não precisa do Anexo C — esse só decide o EMPARELHAMENTO, não o apuramento.)
// quantos terceiros classificados avançam: Mundial de 48 (12 grupos) → 8; Euro de 24 (6 grupos) → 4
function bestThirdsCount(){
  if(ED.groups.length===12) return 8;
  if(ED.groups.length===6)  return 4;
  return 0;
}
function bestThirds(){
  const n=bestThirdsCount(); if(!n) return new Set();
  const arr=ED.groups.map(g=>{ const r=groupStandings(g)[2]; return {team:r.team,pts:r.pts,gd:r.gd,gf:r.gf}; });
  arr.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || rank(a.team)-rank(b.team));
  return new Set(arr.slice(0,n).map(t=>t.team));
}
function renderGroups(){
  let groups=ED.groups;
  const selG = SEL_TEAM ? groupOf(SEL_TEAM) : null;   // grupo da seleção escolhida primeiro
  if(selG) groups=[selG, ...ED.groups.filter(g=>g!==selG)];
  const thirds=bestThirds();
  let h="";
  for(const g of groups){
    const tbl=groupStandings(g);
    h+=`<div class="card"><div class="grp-h"><div class="grp-badge">${g.name}</div><div class="nm">Grupo ${g.name}</div></div>
    <table class="tbl"><thead><tr>
      <th class="l">#</th><th class="l">Equipa</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GM</th><th>GS</th><th>DG</th><th>P</th>
    </tr></thead><tbody>`;
    tbl.forEach((s,i)=>{
      const pc=i===0?"q1":i===1?"q2":(i===2&&thirds.has(s.team)?"q3":"");
      const favc=s.team===FAV?" row-por":"";
      const J=(s.w!=null)?(s.w+s.d+s.l):3;
      const dg=s.gd!=null?((s.gd>=0?'+':'')+s.gd):"·";
      h+=`<tr class="${favc.trim()}">
        <td class="l"><span class="pos ${pc}">${i+1}</span></td>
        <td class="l"><span class="tflag">${fl(s.team)}</span><span class="tname">${pt(s.team)}</span></td>
        <td>${J}</td><td>${_n(s.w)}</td><td>${_n(s.d)}</td><td>${_n(s.l)}</td>
        <td>${_n(s.gf)}</td><td>${_n(s.ga)}</td><td>${dg}</td><td class="pts">${_n(s.pts)}</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  document.getElementById("tablesAll").innerHTML=h;
}

/* ===================== RENDER: PERCURSO ===================== */
function teamOptions(sel){
  // todas as seleções de todas as edições, por ordem alfabética
  const reg = Object.keys(REGISTRY.teams).length ? REGISTRY.teams : (ED?ED.teams:{});
  const names = Object.keys(reg).sort((a,b)=>(reg[a].pt||a).localeCompare(reg[b].pt||b, "pt"));
  return names.map(n=>`<option value="${n}" ${n===sel?"selected":""}>${reg[n].pt||n}</option>`).join("");
}
function selectTeam(v){ SEL_TEAM=v; renderPercurso(); renderGroups(); renderMatchList(); }

// apurou-se da fase de grupos? (1.º/2.º sempre; 3.º só nas edições de 12 grupos, se for dos 8 melhores)
function advancedFromGroup(t, ts){
  if(!ts) return false;
  if(ts.pos<=2) return true;
  if(ts.pos===3 && bestThirdsCount()>0) return bestThirds().has(t);
  return false;
}
// classificação final da seleção: fase de eliminação ou pódio (Vencedor/Finalista/3.º/4.º)
function finalClassification(t, ts){
  if(!ts) return null;
  if(ED.status==="live"){
    if(!advancedFromGroup(t,ts)) return {label:"Fase de grupos", cls:"out"};
    // seleção apurada numa edição em curso: mostra a fase em que está (módulo live)
    const cs=(ED.id==="2026"&&window.LIVE2026&&window.LIVE2026.currentStage)?window.LIVE2026.currentStage(t):null;
    return cs || {label:"Em curso", cls:"live"};
  }
  if(ED.champion===t) return {label:"Vencedor", cls:"win"};
  const ties=allTies().filter(x=>x.home===t||x.away===t);
  if(!ties.length) return {label:"Fase de grupos", cls:"out"};
  const tp=ties.find(x=>x.id==="TP");
  if(tp) return tieWinner(tp)===t ? {label:"3.º Lugar", cls:"win"} : {label:"4.º Lugar", cls:"out"};
  const last=ties[ties.length-1];
  // só a FINAL verdadeira (última ronda do quadro) faz "Finalista";
  // "Quartos de final"/"Oitavos de final" contêm "final" mas NÃO são a final.
  const finalName=ED.knockout&&ED.knockout.rounds.length?ED.knockout.rounds[ED.knockout.rounds.length-1].name:null;
  if(finalName && last.roundFull===finalName && tieWinner(last)!==t) return {label:"Finalista", cls:""};
  return {label:last.roundFull, cls:"out"};
}

// Fase de grupos como PRIMEIRA etapa do timeline (bolinha à esquerda); badge = lugar + apuramento/eliminação
function groupStageHTML(t, ts){
  if(!ts) return "";
  const G=ts.name, adv=advancedFromGroup(t, ts), cls=adv?"done":"gone";
  const badge=`${adv?'apurada':'eliminada'} em ${ts.pos}.º lugar`;
  let body, gm=teamGroupMatches(t);
  if(gm){   // só os jogos desta seleção
    body=`<div class="gpmatches">`;
    for(const m of gm){
      const hw=m.hg>m.ag, aw=m.ag>m.hg;
      body+=`<div class="gpm tm">
        <div class="s h${hw?' win':''}"><span class="nm">${pt(m.h)}</span><span class="fl">${fl(m.h)}</span></div>
        <span class="sc">${m.hg}–${m.ag}</span>
        <div class="s a${aw?' win':''}"><span class="fl">${fl(m.a)}</span><span class="nm">${pt(m.a)}</span></div>
      </div>`;
    }
    body+=`</div>`;
  } else {   // sem jogo-a-jogo -> classificação do grupo com a seleção destacada
    body=`<table class="tbl" style="margin:2px 0 0"><thead><tr>
      <th class="l">Equipa</th><th>J</th><th>DG</th><th>Pts</th></tr></thead><tbody>`;
    ts.table.forEach((row,i)=>{
      const me=row.team===t;
      const j=(row.w!=null)?row.w+row.d+row.l:3;
      const dg=row.gd!=null?`${row.gd>0?'+':''}${row.gd}`:"·";
      body+=`<tr ${me?'class="row-por"':''}>
        <td class="l"><span class="pos ${i<2?'q1':''}">${i+1}</span><span class="tflag">${fl(row.team)}</span><span class="tname">${pt(row.team)}</span></td>
        <td>${j}</td><td>${dg}</td><td class="pts">${_n(row.pts)}</td></tr>`;
    });
    body+=`</tbody></table>`;
  }
  return `<div class="stage ${cls}">
    <div class="sh"><span class="sr">Grupo ${G}</span><span class="reach ${cls}">${badge}</span></div>
    ${body}</div>`;
}

function knockoutPathHTML(t, prefix){
  prefix=prefix||"";
  const path=allTies().filter(x=>x.home===t||x.away===t);
  if(!path.length) return `<div class="stagewrap">${prefix}</div>`;   // eliminada nos grupos (a etapa de grupos já o diz)
  let h=`<div class="stagewrap">`+prefix;
  for(const tie of path){
    const opp=tie.home===t?tie.away:tie.home;
    const won=tieWinner(tie)===t;
    const myg=tie.home===t?tie.hg:tie.ag, og=tie.home===t?tie.ag:tie.hg;
    const pens=tie.pens?` · gp ${tie.home===t?tie.pens[0]:tie.pens[1]}–${tie.home===t?tie.pens[1]:tie.pens[0]}`:"";
    h+=`<div class="stage ${won?'done':'gone'}">
      <div class="sh"><span class="sr">${tie.roundFull}</span>
        <span class="reach ${won?'done':'gone'}">${won?'venceu':'eliminada'}</span></div>
      <div class="oppwrap"><div class="oppline ${won?'cert':''} ${opp===FAV?'por':''}">
        <span class="of">${fl(opp)}</span><span class="on">${pt(opp)}</span>
        <span class="kpath-sc">${myg}–${og}${pens}</span></div></div></div>`;
  }
  h+=`</div>`;
  if(ED.champion===t){
    h+=`<div class="champline"><span class="cup">🏆</span><span class="ct ${t===FAV?'por':''}">${pt(t)} ${champTitle()}</span><span class="cp">${ED.year}</span></div>`;
  }
  return h;
}

function renderPercurso(){
  const t=SEL_TEAM, box=document.getElementById("teamPath");
  setHeaderFlag(t);
  if(!t||!ED){ box.innerHTML=`<div class="pickhint">Escolhe uma seleção para veres o percurso.</div>`; return; }
  const ts=teamStanding(t), favc=t===FAV, plays=!!ts;
  const fc=plays?finalClassification(t,ts):null;
  let h=`<div class="teamhero ${plays?'':'out'}"><span class="bigfl">${fl(t)}</span>
    <div class="meta"><div class="nm ${favc?'por':''}">${pt(t)}</div>
      ${fc?`<div class="finalclass ${fc.cls}">${fc.label}</div>`:`<div class="gl"><b>não participou</b></div>`}</div>
    <select class="heroSel" aria-label="Trocar de seleção" onchange="selectTeam(this.value)">${teamOptions(t)}</select>
    <span class="heroChev" aria-hidden="true">⇄ Trocar</span></div>`;
  if(!plays){   // seleção do registo global que não jogou esta edição
    const eds=(REGISTRY.editions[t]||[]).filter(id=>id!==ED.id)
      .map(id=>{ const m=EDITIONS.find(e=>e.id===id); return m?m.year:id; });
    h+=`<div class="livenote"><span class="ic">🚫</span><div class="tx"><b>${pt(t)}</b> não participou no <b>${ED.title}</b>.${eds.length?` Está nos dados de: <b>${eds.join(", ")}</b> — escolhe essa edição nos chips acima.`:""}</div></div>`;
    box.innerHTML=h; return;
  }
  const gstage=groupStageHTML(t, ts);   // fase de grupos = 1.ª etapa do timeline
  if(ED.status==="live"){
    if(ED.id==="2026" && window.LIVE2026){ h+=window.LIVE2026.percursoStagesHTML(t, gstage); }
    else h+=`<div class="stagewrap">${gstage}</div><div class="livenote"><span class="ic">🧭</span><div class="tx">O <b>mata-eliminatórias</b> desta edição em curso está em pausa (emparelhamento por reativar). Vê os apurados, incluindo os <span class="hl">melhores terceiros</span>, no separador <b>Grupos</b>.</div></div>`;
  }else{
    h+=knockoutPathHTML(t, gstage);
  }
  box.innerHTML=h;
}

/* ===================== RENDER: QUADRO ===================== */
function koCardClosed(tie, label){
  const w=tieWinner(tie);
  const haspor=tie.home===FAV||tie.away===FAV;
  const p=tie.pens;
  const row=(name,g,pen)=>{
    const cls=["koteam"]; if(name===w) cls.push("pick"); if(name===FAV) cls.push("por");
    return `<div class="${cls.join(' ')}"><span class="fl">${fl(name)}</span><span class="nm">${pt(name)}</span>
      <span class="kosc">${g}${pen!=null?`<span class="pen"> (${pen})</span>`:""}</span></div>`;
  };
  return `<div class="ko ${haspor?'haspor':''}">
    <div class="jno"><span>${label||tie.round}</span></div>
    <div class="teams">${row(tie.home,tie.hg,p?p[0]:null)}${row(tie.away,tie.ag,p?p[1]:null)}</div></div>`;
}
function renderBracket(){
  const box=document.getElementById("knockout");
  const reset=document.getElementById("koReset");
  // edição em curso: delega no módulo live (quadro interativo + Anexo C + simulação)
  if(ED.status==="live"){
    if(ED.id==="2026" && window.LIVE2026){
      reset.style.display="flex";
      window.LIVE2026.mount({onChange:()=>{renderPercurso(); renderMatchList();}});
    }else{
      reset.style.display="none";
      box.innerHTML=`<div class="deferred"><span class="ic">🧮</span>
        <b>Quadro a eliminar em pausa nesta edição.</b><br>
        O emparelhamento dos 16-avos (Anexo C) será reativado num próximo torneio.
        Os apurados — <b>1.º, 2.º e os 8 melhores 3.º</b> — estão marcados no separador <b>Grupos</b>.</div>`;
    }
    return;
  }
  reset.style.display="none";
  if(!ED.knockout){ box.innerHTML=`<div class="deferred">Sem dados do quadro para esta edição.</div>`; return; }
  const ko=ED.knockout;
  let cols="", gameNo=0;
  for(const r of ko.rounds){
    let games="";
    for(const id of r.ties){ const t=ko.ties[id]; if(t){ gameNo++;
      games+=`<div class="gw">${koCardClosed(Object.assign({id,round:r.short}, t), "Jogo "+gameNo)}</div>`; } }
    cols+=`<div class="col"><div class="chead">${r.short}</div><div class="games">${games}</div></div>`;
  }
  const champ=ED.champion
    ? `<div class="champ-banner"><span class="cup">🏆</span><span class="fl">${fl(ED.champion)}</span>
         <span class="cwrap"><span class="cn ${ED.champion===FAV?'por':''}">${pt(ED.champion)}</span><span class="ct">${champTitleUC()} ${ED.year}</span></span></div>`
    : "";
  const tp=ko.third
    ? `<div class="thirdplace"><div class="tp-h">Disputa do 3.º / 4.º lugar</div>${koCardClosed(Object.assign({id:"TP",round:"3.º/4.º"}, ko.third), "3.º/4.º lugar")}</div>`
    : "";
  box.innerHTML=`<div class="bracket-hint"><span class="k">↔</span> Arrasta para o lado para veres o quadro todo</div>
    <div class="bracket-scroll"><div class="bracket">${cols}</div></div>${champ}${tp}`;
}

/* ===================== RENDER: LISTA DE JOGOS (só playoffs) ===================== */
// uma linha de jogo (casa | resultado | fora); winner força o destaque (penáltis incluídos)
function mlRow(h,a,hg,ag,pens,winner){
  const known=hg!=null&&ag!=null;
  const hw=winner?winner===h:(known&&hg>ag);
  const aw=winner?winner===a:(known&&ag>hg);
  const sc=known?`${hg}–${ag}`:"—";
  const pk=(pens&&pens.length===2)?`<span class="pk">gp ${pens[0]}–${pens[1]}</span>`:"";
  const tm=(h===SEL_TEAM||a===SEL_TEAM)?" tm":"";
  return `<div class="gpm${tm}">
    <div class="s h${hw?' win':''}"><span class="nm">${pt(h)}</span><span class="fl">${fl(h)}</span></div>
    <div class="mlmid"><span class="sc${known?'':' up'}">${sc}${pk}</span></div>
    <div class="s a${aw?' win':''}"><span class="fl">${fl(a)}</span><span class="nm">${pt(a)}</span></div>
  </div>`;
}
function renderMatchList(){
  const box=document.getElementById("matchList"); if(!box) return;
  if(!ED){ box.innerHTML=""; return; }
  // edição em curso: delega no módulo live (jogos J/K/L + calendário oficial do mata-eliminatórias)
  if(ED.status==="live"){
    box.innerHTML=(ED.id==="2026"&&window.LIVE2026&&window.LIVE2026.matchListHTML)
      ? window.LIVE2026.matchListHTML(SEL_TEAM)
      : `<div class="deferred">Lista de jogos indisponível para esta edição em curso.</div>`;
    return;
  }
  let h="";
  const hdr=name=>`<div class="mlround"><span>${name}</span><span class="mlx"></span></div>`;
  // SÓ PLAYOFFS — por ronda; a disputa do 3.º/4.º vem antes da final
  if(ED.knockout){
    const ko=ED.knockout, rounds=ko.rounds.slice();
    const finalR=rounds.length?rounds[rounds.length-1]:null;
    const emit=(name,ties)=>{ let rows="";
      for(const t of ties){ if(!t) continue; rows+=mlRow(t.home,t.away,t.hg,t.ag,t.pens||null,tieWinner(t)); }
      if(rows) h+=hdr(name)+rows; };
    for(const r of (finalR?rounds.slice(0,-1):rounds)) emit(r.name, r.ties.map(id=>ko.ties[id]));
    if(ko.third) emit("Disputa do 3.º/4.º lugar", [ko.third]);
    if(finalR) emit(finalR.name, finalR.ties.map(id=>ko.ties[id]));
  }
  box.innerHTML=h||`<div class="deferred">Sem jogos para listar nesta edição.</div>`;
}

/* ===================== CHROME DA EDIÇÃO ===================== */
function defaultTeamFor(){
  if(ED.teams && ED.teams[FAV]) return FAV;
  return groupStandings(ED.groups[0])[0].team;
}
function applyEditionChrome(){
  document.title=`${ED.title} — Seleções`;
  const nThird=bestThirdsCount();
  const passamTxt = nThird>0
    ? `Passam os <b>2 primeiros</b> de cada grupo e os <b>${nThird} melhores terceiros</b> (marcados a verde).`
    : `Passam os <b>2 primeiros</b> de cada grupo.`;
  document.getElementById("gruposDesc").innerHTML = ED.status==="closed"
    ? `Classificações finais. ${passamTxt}`
    : (nThird>0 ? passamTxt : `Classificações da fase de grupos.`);
  document.getElementById("footer").innerHTML =
    `${ED.title} · ${ED.host}<br><span style="color:var(--dim)">${ED.source||""}</span>`;
  renderEditionRow();
}
function renderEditionRow(){
  const row=document.getElementById("editionRow");
  row.innerHTML=EDITIONS.map(e=>`<button class="edchip ${ED&&e.id===ED.id?'active':''}" data-ed="${e.id}" role="tab" aria-selected="${ED&&e.id===ED.id}">
    <span class="edcomp ${e.comp}">${e.comp==="euro"?"Euro":"Mundial"}</span>
    <span class="edyear">${e.year}</span>
    <span class="edhost">${e.host}</span>
  </button>`).join("");
  const act=row.querySelector(".edchip.active"); if(act) act.scrollIntoView({inline:"center",block:"nearest"});
}

/* ===================== ARRANQUE / TROCA DE EDIÇÃO ===================== */
function showSplash(){ const s=document.getElementById("splash"); if(s){ s.style.display="flex"; s.classList.remove("hide"); } }
function hideSplash(){ const s=document.getElementById("splash"); if(!s) return; s.classList.add("hide"); setTimeout(()=>{ s.style.display="none"; }, 480); }
function showSwitchDim(){ document.getElementById("switchDim").classList.add("show"); }
function hideSwitchDim(){ document.getElementById("switchDim").classList.remove("show"); }

async function loadEdition(id, isInitial){
  if(isInitial) showSplash(); else showSwitchDim();
  try{
    const r=await fetch(`data/${id}.json`,{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    ED=await r.json();
  }catch(e){
    document.getElementById("teamPath").innerHTML=`<div class="pickhint">Não foi possível carregar a edição (${id}).</div>`;
    if(isInitial) hideSplash(); else hideSwitchDim();
    return;
  }
  await buildRegistry();   // garante a lista global de seleções para o seletor
  // mantém a seleção escolhida ao trocar de edição; só usa o default no 1.º arranque
  if(!SEL_TEAM) SEL_TEAM=defaultTeamFor();
  PICKS={};
  applyEditionChrome();
  renderGroups(); renderPercurso(); renderBracket(); renderMatchList();
  if(isInitial) requestAnimationFrame(()=>setTimeout(hideSplash,150));
  else hideSwitchDim();
}

/* tabs */
document.querySelectorAll(".tab").forEach(tb=>tb.addEventListener("click",()=>{
  const id=tb.dataset.tab;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===tb));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="p-"+id));
  const top=document.querySelector("header").offsetTop;
  if(window.scrollY>top) window.scrollTo({top});
}));

/* sub-menu dos Playoffs: Lista de jogos / Bracket */
document.getElementById("poModes").addEventListener("click",e=>{
  const b=e.target.closest(".omode"); if(!b) return;
  const m=b.dataset.po;
  document.querySelectorAll("#poModes .omode").forEach(x=>{ const on=x===b; x.classList.toggle("active",on); x.setAttribute("aria-selected",on); });
  document.getElementById("po-lista").classList.toggle("active",m==="lista");
  document.getElementById("po-bracket").classList.toggle("active",m==="bracket");
});

/* seletor de edição (régua de chips) */
document.getElementById("editionRow").addEventListener("click",e=>{
  const b=e.target.closest(".edchip"); if(!b) return;
  if(b.dataset.ed!==(ED&&ED.id)) loadEdition(b.dataset.ed);
});

/* bloquear gestos de zoom (pinça) no iOS */
["gesturestart","gesturechange","gestureend"].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
document.addEventListener("touchmove",e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});

/* PWA */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

/* arranque */
loadEdition(DEFAULT_EDITION, true);
